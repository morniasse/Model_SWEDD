<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIG Sénégal - Échantillonnage Localités</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-green: #006400; /* ELU */
            --secondary-green: #90EE90; /* NON ELU */
            --sidebar-width: 380px;
            --header-height: 60px;
            --bg-light: #f8fafc;
            --text-main: #1e293b;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        #dashboard {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Panneau latéral */
        #sidebar {
            width: var(--sidebar-width);
            background: white;
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar.collapsed {
            transform: translateX(calc(-1 * var(--sidebar-width)));
        }

        .sidebar-header {
            padding: 20px;
            background: var(--primary-green);
            color: white;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Table */
        .table-container {
            flex-grow: 1;
            overflow-y: auto;
            border-top: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        thead {
            position: sticky;
            top: 0;
            background: #f1f5f9;
            z-index: 10;
        }

        th {
            text-align: left;
            padding: 12px 15px;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 10px 15px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: background 0.2s;
        }

        tr:hover td {
            background-color: #f0fdf4;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-elu { background: #dcfce7; color: #166534; }
        .badge-non-elu { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

        /* Carte */
        #map-container {
            flex-grow: 1;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* Bouton de basculement */
        #toggle-sidebar {
            position: absolute;
            left: var(--sidebar-width);
            top: 20px;
            z-index: 1001;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0 4px 4px 0;
            padding: 10px 6px;
            cursor: pointer;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            transition: left 0.4s;
        }

        .collapsed + #map-container #toggle-sidebar {
            left: 0;
        }

        /* Popups Leaflet */
        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 8px;
            padding: 5px;
        }
        .popup-title {
            font-weight: bold;
            color: var(--primary-green);
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
            padding-bottom: 2px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #sidebar {
                position: absolute;
                height: 50%;
                width: 100%;
                bottom: 0;
                top: auto;
            }
            #sidebar.collapsed {
                transform: translateY(100%);
            }
            #toggle-sidebar { display: none; }
        }
    </style>
</head>

    // Variables globales
    let map, markers = [];
    const markerGroup = L.layerGroup();
    const eluColor = "#006400";
    const nonEluColor = "#90EE90";

    /**
     * INITIALISATION DU TABLEAU DE BORD
     */
    function init() {
        // Init Map
        map = L.map('map', { zoomControl: false }).setView([14.4974, -14.4524], 7);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        markerGroup.addTo(map);

        // Peuplement UI
        renderStats();
        renderMarkersAndTable();

        // Event Listeners
        document.getElementById('toggle-sidebar').addEventListener('click', toggleSidebar);
    }

    /**
     * RENDU DES MARQUEURS ET DE LA TABLE
     */
    function renderMarkersAndTable() {
        const tableBody = document.getElementById('data-table-body');
        
        rawData.forEach((item, index) => {
            // 1. Créer le marqueur
            const style = {
                radius: 8,
                fillColor: item.status === "ELU" ? eluColor : nonEluColor,
                color: "#ffffff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            };

            const marker = L.circleMarker([item.lat, item.lng], style);
            
            // Tooltip au survol
            marker.bindTooltip(`<strong>${item.name}</strong>`, { direction: 'top', offset: [0, -5] });

            // Popup au clic
            const popupHtml = `
                <div class="custom-popup">
                    <div class="popup-title">${item.name}</div>
                    <div style="font-size:0.85rem">
                        <b>Région:</b> ${item.region}<br>
                        <b>Dépt:</b> ${item.dept}<br>
                        <b>Statut:</b> <span style="color:${style.fillColor};font-weight:bold">${item.status}</span><br>
                        <hr style="margin:5px 0; border:0; border-top:1px solid #eee">
                        <small>${item.lat.toFixed(4)}, ${item.lng.toFixed(4)}</small>
                    </div>
                </div>
            `;
            marker.bindPopup(popupHtml);

            // Zoom on marker click
            marker.on('click', () => {
                map.flyTo([item.lat, item.lng], 12);
            });

            marker.addTo(markerGroup);
            markers.push(marker);

            // 2. Créer la ligne de tableau
            const tr = document.createElement('tr');
            const statusClass = item.status === "ELU" ? "badge-elu" : "badge-non-elu";
            
            tr.innerHTML = `
                <td><b>${item.name}</b><br><small style="color:#64748b">${item.dept}</small></td>
                <td><span class="badge ${statusClass}">${item.status}</span></td>
            `;

            tr.addEventListener('click', () => {
                focusLocation(item, marker);
            });

            tableBody.appendChild(tr);
        });
    }

    /**
     * FOCUS SUR UNE LOCALITÉ
     */
    function focusLocation(item, marker) {
        map.flyTo([item.lat, item.lng], 12, { duration: 1.5 });
        
        // Attendre la fin du vol pour ouvrir le popup
        setTimeout(() => {
            marker.openPopup();
            
            // Effet visuel temporaire
            const originalRadius = marker.getRadius();
            marker.setRadius(15);
            setTimeout(() => marker.setRadius(originalRadius), 1000);
        }, 1200);

        // Sur mobile, cacher la table après sélection
        if(window.innerWidth <= 768) toggleSidebar();
    }

    /**
     * GESTION DE L'INTERFACE
     */
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const btn = document.getElementById('toggle-sidebar');
        sidebar.classList.toggle('collapsed');
        btn.innerText = sidebar.classList.contains('collapsed') ? '▶' : '◀';
        
        // Redimensionner la carte après transition
        setTimeout(() => map.invalidateSize(), 400);
    }

    function renderStats() {
        const countElu = rawData.filter(d => d.status === "ELU").length;
        const countNonElu = rawData.length - countElu;
        
        document.getElementById('quick-stats').innerHTML = `
            <div class="stat-item"><span style="color:${eluColor}">●</span> ${countElu} Élus</div>
            <div class="stat-item"><span style="color:${nonEluColor}">●</span> ${countNonElu} Non Élus</div>
            <div class="stat-item" style="margin-left:auto">Total: ${rawData.length}</div>
        `;
    }

    // Lancement
    window.onload = init;

</script>
